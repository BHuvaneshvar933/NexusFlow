version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusflow-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexuspassword
      POSTGRES_DB: nexusflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexusflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusflow-backend
    environment:
      # Connects to the postgres and redis services defined above
      - DATABASE_URL=postgresql://nexus:nexuspassword@postgres:5432/nexusflow?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey123
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_BACKEND_URL must be accessible from the user's browser, not just within the Docker network!
        # If hosting remotely, change this to your server's IP or Domain (e.g., http://your-domain.com:3000)
        - VITE_BACKEND_URL=http://localhost:3000
    container_name: nexusflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
